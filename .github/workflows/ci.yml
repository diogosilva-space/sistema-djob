name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Build packages
        run: npx turbo run build --filter='./packages/*'

      - name: Lint
        run: npx turbo run lint

      - name: Test API
        run: npm test --workspace=apps/api
        env:
          JWT_SECRET: ci-test-secret
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Build Web
        run: npx turbo run build --filter=web
        env:
          NEXT_PUBLIC_API_URL: https://api.djob.com.br

  build-api:
    name: Build API Docker
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t djob-api:${{ github.sha }} \
            -t djob-api:latest \
            .

      - name: Save Docker image
        run: docker save djob-api:latest | gzip > djob-api.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: djob-api.tar.gz
          retention-days: 3
