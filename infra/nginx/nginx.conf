worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # --- HTTP (sempre ativo — serve ACME challenge + proxy ou redirect) ---
    server {
        listen 80;
        server_name api.djob.com.br;

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Se SSL ainda não configurado, proxy direto; senão, redirect.
        # Troque este bloco pelo redirect abaixo após gerar o certificado.
        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        # ---- DESCOMENTAR APÓS GERAR CERTIFICADO SSL ----
        # location / {
        #     return 301 https://$host$request_uri;
        # }
    }

